name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Read mod version from properties
        id: read_property
        uses: christian-draeger/read-properties@1.1.1
        with:
          path: './gradle.properties'
          properties: 'mod_version'
      - name: Run client data generation
        run: ./gradlew runClientData -Pmod_version="${{steps.read_property.outputs.mod_version}}-snapshot${{github.run_number}}"
      - name: Run server data generation
        run: ./gradlew runServerData -Pmod_version="${{steps.read_property.outputs.mod_version}}-snapshot${{github.run_number}}"     
      - name: Run build jar
        run: ./gradlew jar -Pmod_version="${{steps.read_property.outputs.mod_version}}-snapshot${{github.run_number}}"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beecrasy-binary
          path: build/libs/*.jar
          if-no-files-found: error
          overwrite: true