plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.1.26'
    id 'net.neoforged.licenser' version '0.7.5'
}
license {
    header = project.file('HEADER.txt')
    properties {
        name = 'khjxiaogu'
        year = Calendar.getInstance().get(Calendar.YEAR)
    }
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}


version = mod_version
group = mod_group_id
sourceSets {
    main {
    	java {
    		srcDir 'src/generated/java'
    	}
        resources {
        	// Include resources generated by data generators.
            srcDir 'src/generated/resources/client'
            srcDir 'src/generated/resources/server'
		    
		    // Exclude common development only resources from finalized outputs
		    exclude("**/*.bbmodel") // BlockBench project files
		    exclude("src/generated/**/.cache") // datagen cache files
		    exclude("src/generated/.cache") // datagen cache files
		    exclude('src/generated/resources/client/assets/beecrasy/lang')// original language file
        }
    }
	datagen {
        compileClasspath += main.compileClasspath
        compileClasspath += main.output
        resources {
            exclude('assets/beecrasy/lang')
        }
    }
    client {}
}
import groovy.json.JsonOutput
import groovy.json.JsonSlurper
tasks.register('mergeLangFiles') {
    def buildDir=new File(rootProject.buildDir,"mergeLangFiles");
    def inputDir=rootProject.file("src/main/resources/assets/${mod_id}/lang")
    def generatedDir=rootProject.file("src/generated/resources/client/assets/${mod_id}/lang")
	inputs.dir inputDir
	if(generatedDir.exists())
		inputs.dir generatedDir
	outputs.dir buildDir
	
    doLast{
        def langList=inputDir.listFiles({ f -> f.isFile() } as FileFilter)
        langList.each{fn->
        	
        	def langFile=new TreeMap<String, String>();
        	def generatedLang=new File(generatedDir,fn.name)
        	if(generatedLang.exists())
        		new JsonSlurper().parse(generatedLang).each{key,value->langFile.put(key,value)}
			new JsonSlurper().parse(fn).each{key,value->langFile.put(key,value)}
			//write to output
			buildDir.mkdirs()
			new File(buildDir,fn.name).text=JsonOutput.prettyPrint(JsonOutput.toJson(langFile))
        
        }
    }
}

repositories {
    // Add here additional repositories if required by some of the dependencies below.
}

base {
    archivesName = mod_id
}

// Mojang ships Java 25 to end users in 26.1.2, so mods should target Java 25.
java.toolchain.languageVersion = JavaLanguageVersion.of(25)

minecraft.accessTransformers.file rootProject.file('src/main/resources/META-INF/accesstransformer.cfg')
//minecraft.accessTransformers.entry public net.minecraft.client.Minecraft textureManager # textureManager

// Default run configurations.
// These can be tweaked, removed, or duplicated as needed.
runs {
    // applies to all the run configs below
    configureEach {
        // Recommended logging data for a userdev environment
        // The markers can be added/remove as needed separated by commas.
        // "SCAN": For mods scan.
        // "REGISTRIES": For firing of registry events.
        // "REGISTRYDUMP": For getting the contents of all registries.
        systemProperty 'forge.logging.markers', 'REGISTRIES'

        // Recommended logging level for the console
        // You can set various levels here.
        // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
        systemProperty 'forge.logging.console.level', 'debug'

        workingDirectory project.layout.projectDirectory.dir('run').dir(name)

        modSource project.sourceSets.main
    }

    client {
    	modSource project.sourceSets.client
        // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        jvmArgument '-Xmx1024m'
    }

    server {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    // This run config launches GameTestServer and runs all registered gametests, then exits.
    // By default, the server will crash when no gametests are provided.
    // The gametest system is also enabled by default for other run configs under the /test command.
    gameTestServer {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }
    clientData {
        // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
        // workingDirectory project.file('run-data')
		//modSource project.sourceSets.datagen
        // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
        modSource project.sourceSets.datagen
        arguments.addAll '--mod', project.mod_id,
         '--all',
         '--output', file('src/generated/resources/client').getAbsolutePath(),
         '--existing', file('src/main/resources/').getAbsolutePath()
    }
    serverData {
        // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
        // workingDirectory project.file('run-data')
		//modSource project.sourceSets.datagen
        // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
        modSource project.sourceSets.datagen
        arguments.addAll '--mod', project.mod_id,
         '--all',
         '--output', file('src/generated/resources/server').getAbsolutePath(),
         '--existing', file('src/main/resources/').getAbsolutePath()
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}
repositories {
    mavenLocal()
    mavenCentral()
    //khjxiaogu public maven
	maven { url = "https://www.khjxiaogu.com/maven" }
    exclusiveContent {
        forRepository {
            maven {
                url = "https://cursemaven.com/"
            }
        }
        filter {
            includeGroup "curse.maven"
        }
    }

    //for patchouli books and jei
    maven { url = 'https://maven.blamejared.com' }
    maven { url = "https://maven.architectury.dev/" }
    //for top
    maven { url = "https://maven.k-4u.nl" }
    maven {
        url = "https://maven.saps.dev/minecraft"
        content {
            includeGroup "dev.ftb.mods"
            includeGroup "dev.latvian.mods"
        }
    }
}
dependencies {
    // Specify the version of Minecraft to use.
    // Depending on the plugin applied there are several options. We will assume you applied the userdev plugin as shown above.
    // The group for userdev is net.neoforged, the module name is neoforge, and the version is the same as the neoforge version.
    // You can however also use the vanilla plugin (net.neoforged.gradle.vanilla) to use a version of Minecraft without the neoforge loader.
    // And its provides the option to then use net.minecraft as the group, and one of; client, server or joined as the module name, plus the game version as version.
    // For all intends and purposes: You can treat this dependency as if it is a normal library you would use.
    implementation "net.neoforged:neoforge:${neo_version}"

    // Example optional mod dependency with JEI
    // The JEI API is declared for compile time use, while the full JEI artifact is used at runtime
	compileOnly("mezz.jei:jei-26.1.2-common-api:${jei_version}")
 	compileOnly("mezz.jei:jei-26.1.2-neoforge-api:${jei_version}")
  	// at runtime, use the full JEI jar for NeoForge
  	runtimeOnly("mezz.jei:jei-26.1.2-neoforge:${jei_version}")

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
// When "copyIdeResources" is enabled, this will also run before the game launches in IDE environments.
// See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties
	duplicatesStrategy = DuplicatesStrategy.WARN
    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}
processResources.dependsOn(mergeLangFiles)
processResources{
	from(tasks.mergeLangFiles.outputs.files){ into 'assets/beecrasy/lang/'}
}
task sourcesJar(type: Jar, dependsOn: classes) {
    from sourceSets.main.allSource
	duplicatesStrategy = DuplicatesStrategy.WARN
    archiveClassifier.set('sources')
}
artifacts {
    archives sourcesJar
}
publish.finalizedBy('publishToMavenLocal')
publishing {
    publications {
        maven(MavenPublication) {
            artifact jar
            artifact sourcesJar
        }
    }
    repositories {
        maven {
            url = 'https://www.khjxiaogu.com/maven'
            credentials {
                username = findProperty('khjmavenUser')
                password = findProperty('khjmavenPass')
            }
        }
    }
}


tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
